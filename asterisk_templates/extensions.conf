; ============================================================================
; WASA — Extensions Dialplan Template (extensions.conf)
; ============================================================================
; This dialplan shows how to route incoming calls to the AudioSocket server
; to perform live voice transcription, channel splitting, and analysis.
;
; AudioSocket application syntax:
;   AudioSocket(<server-uuid>,<host:port>[,options])
; ============================================================================

[default]

; Option 1: Live Audiosocket Streaming
; Connect the call channel directly to the WASA AudioSocket server.
; The AudioSocket server will receive a live stream of the call audio.
exten => 100,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Verbose(1, Routing channel to WASA AudioSocket Server)
 same => n,AudioSocket(00000000-0000-0000-0000-000000000001,127.0.0.1:9092)
 same => n,Hangup()

; Option 2: Stereo Channel Splitting and Post-Processing
; MixMonitor can record the caller and callee in separate channels (stereo).
; You can record the call to a wav file and then upload/process via WASA.
exten => 200,1,Answer()
 same => n,Verbose(1, Starting stereo call recording)
 ; S option splits caller (left channel) and callee (right channel)
 same => n,MixMonitor(/var/spool/asterisk/monitor/call-${UNIQUEID}.wav,S)
 same => n,Dial(PJSIP/alice,60)
 same => n,Hangup()

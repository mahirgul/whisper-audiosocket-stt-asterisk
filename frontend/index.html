<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASA — Whisper AudioSocket Asterisk</title>
    <meta name="description" content="AI-powered stereo audio transcription with independent channel control.">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <script src="/static/js/wavesurfer.min.js"></script>
    <script src="/static/js/script.js?v=2" defer></script>
</head>
<body>

    <div id="modelOverlay" style="display:none;"><div class="spinner"></div><p style="margin-top:20px; font-size:0.85rem; color:#64748b; font-weight:700;">Waking up the AI...</p></div>

    <!-- Shared topbar navigation -->
    <nav class="topbar">
        <a href="https://mhrgl.com" target="_blank" class="topbar-brand">
            <div class="brand-icon">🎙</div>
            <div>
                <div class="brand-name">WASA</div>
                <div class="brand-sub">Whisper AudioSocket Asterisk</div>
            </div>
        </a>
        <div class="topbar-divider"></div>
        <div class="topbar-nav">
            <a href="/" class="active"><span class="nav-icon">🎛</span> Studio</a>
            <a href="/audiosocket.html"><span class="nav-icon">📡</span> AudioSocket</a>
            <a href="/config.html"><span class="nav-icon">⚙️</span> Config</a>
        </div>
    </nav>

    <div class="container">

        <!-- ── Left: main content ───────────────────────── -->
        <div class="left-panel">

            <!-- Stats bar -->
            <div class="stats-bar">
                <div class="stat-item">
                    <strong id="sCpu">0%</strong>
                    CPU
                </div>
                <div class="stat-item">
                    <strong id="sRam">0/0 GB</strong>
                    RAM
                </div>
                <div class="stat-item">
                    <strong id="sTask" style="color:var(--primary);">Idle</strong>
                    TASK
                </div>
            </div>

            <!-- Transcription studio card -->
            <div class="main-card card">
                <div class="card-header">
                    🎛 Transcription Studio
                </div>
                <div id="setupArea">
                    <div id="fileTab" class="tab-content active">
                        <div id="uploadArea" class="drop-zone" onclick="document.getElementById('f').click()">
                            <div id="fL">Drop Stereo Audio or Click to Upload</div>
                            <input type="file" id="f" accept="audio/*" onchange="start()" style="display:none">
                        </div>
                    </div>
                </div>

                <div id="loadingBar">...</div>

                <!-- Player -->
                <div id="playerCard" class="player-card">
                    <div class="player-header">🎧 Audio Player &mdash; <span id="playingLabel"></span></div>
                    <div id="waveform"></div>
                    <div class="controls">
                        <button id="playPause" class="btn">PLAY / PAUSE</button>
                        <button id="btnLeft"  class="btn btn-secondary">LEFT (L)</button>
                        <button id="btnRight" class="btn btn-secondary">RIGHT (R)</button>
                        <button id="btnBoth"  class="btn btn-secondary btn-active">BOTH (STEREO)</button>
                    </div>
                    <button id="btnNew" class="btn btn-new" onclick="resetUI()">+ START NEW TASK</button>
                </div>
            </div>

            <!-- Transcript cards -->
            <div id="resultsGrid" class="results-grid" style="display:none;">
                <div class="section-label">Transcripts</div>
                <div class="card"><div class="card-header">ORIGINAL LEFT</div><div id="boxOL" class="content">...</div></div>
                <div class="card"><div class="card-header">ORIGINAL RIGHT</div><div id="boxOR" class="content">...</div></div>
            </div>

        </div><!-- /.left-panel -->

        <!-- ── Right: history panel ─────────────────────── -->
        <div class="card history-panel">
            <div class="card-header">
                History
                <button class="btn btn-sm" style="background:#f1f5f9; color:#64748b;" onclick="loadHistory(1)">🔄 Refresh</button>
            </div>
            <div class="card-body">
                <!-- Bulk actions -->
                <div id="bulkActions" class="bulk-actions">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" id="selectAll" onclick="toggleSelectAll()">
                        <span id="selectedCount" style="font-size:0.65rem; font-weight:700; color:#e11d48;">0 selected</span>
                    </div>
                    <button onclick="deleteSelected()" class="download-link" style="color:white; background:#e11d48; border-color:#e11d48;">DELETE SELECTED</button>
                </div>

                <div id="historyList"></div>
                <div id="pagination" class="pagination"></div>
            </div><!-- /.card-body -->
        </div><!-- /.history-panel -->
    </div><!-- /.container -->

<footer>
    <div class="footer-content">
        <div class="footer-brand">
            <span class="footer-icon">🎙</span>
            <span>WASA</span>
        </div>
        <div class="footer-links">
            <a href="https://mhrgl.com" target="_blank">© 2026 MHRGL.COM</a>
            <span class="footer-sep"></span>
            <a href="https://mhrgl.com" target="_blank">Support</a>
        </div>
    </div>
</footer>
</body>
</html>
